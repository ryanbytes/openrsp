name: Build and test

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  unix:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libusb-1.0-0-dev pkg-config
      - name: Install macOS dependencies
        if: runner.os == 'macOS'
        run: brew install libusb pkg-config
      - name: Configure
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release
      - name: Build
        run: cmake --build build --parallel
      - name: Test
        run: ctest --test-dir build --output-on-failure --timeout 20 --verbose
      - name: Verify staged install
        run: |
          prefix="$RUNNER_TEMP/openrsp-install"
          cmake --install build --prefix "$prefix"
          test -x "$prefix/bin/openrsp-probe"
          test -x "$prefix/bin/openrsp-reset"
          test -x "$prefix/bin/openrsp-extract-firmware"
          test -x "$prefix/sbin/openrspd"
          test -f "$prefix/include/sdrplay_api.h"
          test -f "$prefix/include/sdrplay_api_rspDuo.h"
          test -d "$prefix/share/openrsp/firmware"
          test -f "$prefix/lib/pkgconfig/sdrplay_api.pc"
          if [ "$RUNNER_OS" = Linux ]; then
            test -L "$prefix/lib/libsdrplay_api.so"
            test -L "$prefix/lib/libsdrplay_api.so.3"
            test -f "$prefix/lib/libsdrplay_api.so.3.15"
            test -f "$prefix/lib/systemd/system/openrspd.service"
          else
            test -f "$prefix/lib/libsdrplay_api.so.3.15"
          fi
